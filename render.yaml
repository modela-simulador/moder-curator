services:
  - type: web
    name: moder-curator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --graceful-timeout 120 --workers 1 --threads 4
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: curator-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
