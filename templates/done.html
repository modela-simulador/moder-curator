<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#fafafa">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%231c1c1e' width='180' height='180' rx='40'/%3E%3Ctext x='90' y='125' text-anchor='middle' fill='white' font-family='Georgia,serif' font-size='100' font-weight='bold'%3EM%3C/text%3E%3C/svg%3E">
    <title>MODÈR Curator — Listo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafafa; color: #1c1c1e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px 24px; }
        .check { font-size: 64px; margin-bottom: 20px; }
        .title { font-family: 'Times New Roman', serif; font-size: 32px; letter-spacing: 4px; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 30px; }
        .stat { font-size: 48px; font-weight: 700; margin-bottom: 4px; }
        .stat-label { font-size: 13px; color: #888; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 16px 32px; border-radius: 30px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: #1c1c1e; color: white; }
        .btn-primary:hover { background: #333; }
        .btn-secondary { background: white; color: #1c1c1e; border: 1.5px solid #ddd; margin-top: 12px; }
        button, .btn { touch-action: manipulation; }

        @media (max-width: 600px) {
            .container { padding: 32px 20px; width: 100%; }
            .check { font-size: 52px; margin-bottom: 16px; }
            .title { font-size: 26px; letter-spacing: 3px; }
            .subtitle { font-size: 13px; margin-bottom: 24px; }
            .stat { font-size: 40px; }
            .stat-label { font-size: 12px; margin-bottom: 24px; }
            .btn { display: block; width: 100%; text-align: center; padding: 16px 24px; font-size: 15px; min-height: 48px; }
            .btn-secondary { margin-top: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="check">✓</div>
        <div class="title">MODÈR</div>
        <div class="subtitle">Todos los productos han sido revisados</div>
        <div class="stat">{{ accepted_count }}</div>
        <div class="stat-label">productos aprobados de {{ total }} revisados</div>

        <button onclick="generateAndDownload(this)" class="btn btn-primary">📥 Generar y descargar planilla</button><br>
        <a href="/" class="btn btn-secondary">← Volver al inicio</a>
    </div>
    <script>
        function generateAndDownload(btn) {
            btn.textContent = 'Descargando...';
            btn.disabled = true;
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'finish' })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'error') {
                    alert('Error: ' + (data.error || 'No se pudo generar'));
                    btn.textContent = '📥 Generar y descargar planilla';
                    btn.disabled = false;
                    return;
                }
                window.location.href = '/download';
            })
            .catch(err => {
                alert('Error: ' + err.message);
                btn.textContent = '📥 Generar y descargar planilla';
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
